name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Icarus Verilog
      run: sudo apt-get update && sudo apt-get install -y iverilog

    - name: Run Standalone PID Test
      run: |
        iverilog -o sim/tb_pid.vvp rtl/pid_controller.v rtl/saturation_guard.v sim/tb_pid.v
        vvp sim/tb_pid.vvp

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: pip install cocotb matplotlib numpy

    - name: Run Full HiL Simulation
      run: python sim/run_sim.py
